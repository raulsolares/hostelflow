// Derive 2-3 value cards from the hotel's real modules/services/posts
function buildValueCards() {
const cards = [];
const seen = new Set();
const push = (icon, title, sub) => {
if (!title || seen.has(title)) return;
seen.add(title); cards.push({ icon, title, sub });
};
// From real modules (up to 3)
(state.modules || []).slice(0, 3).forEach(m => {
push(m.icon || 'info', m.title || '', m.subtitle || m.description || t('vServicesSub'));
});
// Guide/tours if posts exist
if ((state.posts || []).some(p => p.section === 'guide' || p.section === 'tour')) {
push('map-pin', t('vGuide'), t('vGuideSub'));
}
// Contact/help fallback
const h = state.hotel || {};
if (h.whatsapp) push('whatsapp', t('vHelp'), t('vHelpSub'));
// Guarantee 2-3 cards with sensible fallbacks
if (cards.length < 2) {
push('wifi', t('vWifi'), t('vWifiSub'));
push('services', t('vServices'), t('vServicesSub'));
push('map-pin', t('vGuide'), t('vGuideSub'));
}
return cards.slice(0, 3);
}

// ---------- Lightbox ----------
function openLightbox(idx) {
const items = state.gallery || [];
if (!items.length) return;
state.lightboxIdx = ((idx % items.length) + items.length) % items.length;
renderLightbox();
document.getElementById('lightbox-overlay').classList.remove('hidden');
document.addEventListener('keydown', lightboxKeyHandler);
}
function closeLightbox() {
const ov = document.getElementById('lightbox-overlay');
if (ov) ov.classList.add('hidden');
document.removeEventListener('keydown', lightboxKeyHandler);
}
function lightboxNext() {
const items = state.gallery || [];
if (!items.length) return;
state.lightboxIdx = (state.lightboxIdx + 1) % items.length;
renderLightbox();
}
function lightboxPrev() {
const items = state.gallery || [];
if (!items.length) return;
state.lightboxIdx = (state.lightboxIdx - 1 + items.length) % items.length;
renderLightbox();
}
function renderLightbox() {
const items = state.gallery || [];
const g = items[state.lightboxIdx];
if (!g) return;
const caption = ct(g, 'caption') || '';
document.getElementById('lightbox-img').src = g.image_url;
document.getElementById('lightbox-img').alt = caption;
document.getElementById('lightbox-caption').textContent = caption;
document.getElementById('lightbox-counter').textContent = `${state.lightboxIdx + 1}/${items.length}`;
}
function lightboxKeyHandler(e) {
if (e.key === 'Escape') closeLightbox();
else if (e.key === 'ArrowRight') lightboxNext();
else if (e.key === 'ArrowLeft') lightboxPrev();
}
// Swipe support on the lightbox stage
function initLightboxSwipe() {
const stage = document.getElementById('lightbox-stage');
if (!stage || stage.dataset.swipeBound) return;
stage.dataset.swipeBound = '1';
let sx = 0, sy = 0;
stage.addEventListener('touchstart', (e) => {
const t0 = e.changedTouches[0];
sx = t0.clientX; sy = t0.clientY;
}, { passive: true });
stage.addEventListener('touchend', (e) => {
const t0 = e.changedTouches[0];
const dx = t0.clientX - sx, dy = t0.clientY - sy;
if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) { dx < 0 ? lightboxNext() : lightboxPrev(); }
}, { passive: true });
}

// ---------- Header presets (classic/centered/split/custom) ----------
function applyHeroOverlay(style, cfg, themeName) {
const scrim = document.getElementById('home-hero-scrim');
if (!scrim) return;
if (style === 'classic') { scrim.style.background = ''; return; }
const overlay = (cfg && typeof cfg.overlay === 'number') ? cfg.overlay : 0.45;
if (themeName === 'resort') {

function clearFieldError(id) {
const f = document.getElementById(id);

async function submitOnboarding(e) {
if (e && e.preventDefault) e.preventDefault();
if (e && e.stopPropagation) e.stopPropagation();

const nameEl = document.getElementById('field-name');
const emailEl = document.getElementById('field-email');
const name = nameEl.value.trim();
const email = emailEl.value.trim();
let ok = true;

// Inline validation
clearFieldError('field-name'); hideFieldError('err-name');
clearFieldError('field-email'); hideFieldError('err-email');
if (!name) { setFieldError('field-name', 'err-name', t('errNameRequired')); ok = false; }
if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
setFieldError('field-email', 'err-email', t('errEmailInvalid')); ok = false;
}
if (!document.getElementById('field-consent').checked) {
showToast(t('errConsent')); ok = false;
}
if (!ok) return;

const payload = {
name,
whatsapp: document.getElementById('field-whatsapp').value.trim(),
email,
check_in_date: document.getElementById('field-checkin').value || null,
check_out_date: document.getElementById('field-checkout').value || null,
language: document.getElementById('field-language').value,
consent_contact: true,
source_qr: new URLSearchParams(window.location.search).get('source') || null,
};

const btn = document.getElementById('btn-onboard-submit');
btn.disabled = true;
btn.textContent = t('loading');

const result = await apiFetch(`/api/guest/${state.slug}/onboarding`, {
method: 'POST',
body: JSON.stringify(payload),
});

btn.disabled = false;
btn.textContent = t('btnContinueFlow');

if (result && (result.guest_lead_id || result.id)) {
const leadId = result.guest_lead_id || result.id;
state.guestLeadId = leadId;
state.guestName = name;
state.currentLang = payload.language || state.currentLang;
// Persist to localStorage so returning guests skip onboarding
localStorage.setItem(`hf_lead_${state.slug}`, leadId);
localStorage.setItem(`hf_name_${state.slug}`, name);
localStorage.setItem(`hf_lang_${state.slug}`, state.currentLang);
// Also store onboarding payload for re-use
localStorage.setItem(`hf_onboard_${state.slug}`, JSON.stringify(payload));
logEvent('onboarding_complete');
renderClosing();
goStep(3);
} else {
showToast(state.currentLang === 'es' ? 'Error al registrar. Intenta de nuevo.' : 'Registration error. Please try again.');
}
}

// ---------- Push notifications opt-in ----------
function urlBase64ToUint8Array(base64String) {
const padding = '='.repeat((4 - base64String.length % 4) % 4);
const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
const rawData = atob(base64);
const outputArray = new Uint8Array(rawData.length);
for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
return outputArray;
}
function pushSupported() {
return ('PushManager' in window) && ('Notification' in window) && ('serviceWorker' in navigator);
}
function pushDismissActive() {
try {
const raw = localStorage.getItem(`hf_push_dismissed_${state.slug}`);
if (!raw) return false;
const until = parseInt(raw, 10);
if (isNaN(until)) return false;
if (Date.now() > until) { localStorage.removeItem(`hf_push_dismissed_${state.slug}`); return false; }
return true;
} catch (e) { return false; }
}
function pushAlreadyOn() {
try { return localStorage.getItem(`hf_push_on_${state.slug}`) === '1'; } catch (e) { return false; }
}
function shouldShowPushCard() {
if (!pushSupported()) return false;
if (Notification.permission !== 'default') return false;
// If the guest already made a choice during onboarding closing, respect it.
// 'granted' => already subscribed (pushAlreadyOn below also covers this).
// 'dismissed' => pushDismissActive() below enforces the 7-day cool-off set by obDismissPush().
if (obPushChoice() === 'granted') return false;
if (pushDismissActive()) return false;
if (pushAlreadyOn()) return false;
if (state.isIOS && !state.isStandalone) return false;
return true;
}
function refreshPushUI() {
const card = document.getElementById('push-optin-card');
if (!card) return;
card.classList.toggle('hidden', !shouldShowPushCard());
}
function hidePushCard() {
const card = document.getElementById('push-optin-card');
if (!card) return;
card.classList.add('fade-out-push');
setTimeout(() => card.classList.add('hidden'), 300);
}
function dismissPushCard() {
hidePushCard();
try { localStorage.setItem(`hf_push_dismissed_${state.slug}`, String(Date.now() + 7 * 24 * 60 * 60 * 1000)); } catch (e) {}
}
async function enablePushNotifications() {
try {
const perm = await Notification.requestPermission();
if (perm !== 'granted') {
hidePushCard();
try { localStorage.setItem(`hf_push_dismissed_${state.slug}`, String(Date.now() + 30 * 24 * 60 * 60 * 1000)); } catch (e) {}
return;
}
const reg = await navigator.serviceWorker.ready;
const keyResp = await apiFetch(`/api/guest/${state.slug}/push/public-key`);
if (!keyResp || !keyResp.public_key) throw new Error('missing public key');
const sub = await reg.pushManager.subscribe({
userVisibleOnly: true,
applicationServerKey: urlBase64ToUint8Array(keyResp.public_key)
});
const subJson = sub.toJSON();
const res = await apiFetch(`/api/guest/${state.slug}/push/subscribe`, {
method: 'POST',
body: JSON.stringify({
endpoint: subJson.endpoint,
keys: subJson.keys,
guest_lead_id: state.guestLeadId ? Number(state.guestLeadId) : null,
lang: state.currentLang
})
});
if (!res || res.ok !== true) throw new Error('subscribe failed');
try { localStorage.setItem(`hf_push_on_${state.slug}`, '1'); } catch (e) {}
showToast(t('pushToastOn'));
hidePushCard();
} catch (err) {
console.warn('Push subscribe error:', err);
showToast(t('pushToastErr'));
}
}

function escapeHtml(str) {
if (!str) return '';
const div = document.createElement('div');
div.textContent = str;
return div.innerHTML;
}

function showToast(msg) {
const toast = document.getElementById('toast');
toast.textContent = msg;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

// Guía no disponible (trial vencido / hotel suspendido) — pantalla amable sin contenido
function showUnavailable(h) {
const ls = document.getElementById('loading-screen');
if (ls) ls.classList.add('fade-out');
document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
if (h.primary_color) document.documentElement.style.setProperty('--primary', h.primary_color);
const div = document.createElement('div');
div.className = 'error-container';
div.innerHTML = `
${h.logo_url ? `<img src="${escapeHtml(h.logo_url)}" alt="" style="max-width:96px;max-height:64px;object-fit:contain;margin-bottom:16px" onerror="this.remove()">` : ''}
<h2>${escapeHtml(h.nombre || '')}</h2>
<p>${t('unavailableMsg')}</p>
`;
document.body.appendChild(div);
}

function showError() {
const ls = document.getElementById('loading-screen');
if (ls) ls.classList.add('fade-out');
document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
const div = document.createElement('div');
div.className = 'error-container';
div.innerHTML = `
<div class="error-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="64" height="64"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01"/><path d="M9 12v.01"/><path d="M9 15v.01"/><path d="M9 18v.01"/></svg></div>
<h2>${t('errorTitle')}</h2>
<p>${t('errorMsg')}</p>
<button class="btn-primary" onclick="location.reload()">Reintentar</button>
`;
document.body.appendChild(div);
}

// ---------- Popup ----------
function showPopup(popup) {
const overlay = document.getElementById('popup-overlay');
const content = document.getElementById('popup-content');
let html = '';
if (popup.image_url) html += `<img class="popup-img" src="${escapeHtml(popup.image_url)}" alt="">`;
html += `<div class="popup-body"><h3>${escapeHtml(ct(popup, 'title'))}</h3>`;
const popupMsg = ct(popup, 'message');
if (popupMsg) html += `<p>${escapeHtml(popupMsg)}</p>`;
if (popup.button_text && popup.button_url) html += `<a class="post-card-btn" href="${escapeHtml(popup.button_url)}" target="_blank" style="width:100%;justify-content:center">${escapeHtml(popup.button_text)}</a>`;
html += '</div>';
content.innerHTML = html;
overlay.classList.remove('hidden');
}
function closePopup() { document.getElementById('popup-overlay').classList.add('hidden'); }

// Contact Bar visibility - show only on home view
function updateContactBar() {
  const bar = document.getElementById('global-contact-bar');
  if (!bar) return;
  const homeView = document.getElementById('home-view');
  const isHome = homeView && homeView.classList.contains('active');
  bar.classList.toggle('hidden-bar', !isHome);
}

// Compact header glass morphism on scroll — no longer needed (hero is unified)
// but keep #home-header ref for view-active reset.

// ---------- Scroll reveal (home sections) ----------
function initScrollReveal() {
  if (state.revealInit) return;
  const targets = document.querySelectorAll('#home-view .reveal');
  if (!targets.length) return;
  state.revealInit = true;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion || !('IntersectionObserver' in window)) {
    targets.forEach(el => el.classList.add('in-view'));
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });
  targets.forEach((el, i) => {
    el.style.transitionDelay = (Math.min(i, 6) * 0.06) + 's';
    observer.observe(el);
  });
}
</script>
